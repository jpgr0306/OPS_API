name: Automação de Dados e Patentes

on:
  schedule:
    # Roda toda segunda-feira às 08:00 UTC
    # (08:00 UTC é 05:00 no horário de Brasília, ajuste se necessário)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Permite que você rode manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script de automação
        env:
          # Mapeia os Secrets do GitHub para as variáveis que o seu código usa
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          OPS_CONSUMER_KEY: ${{ secrets.OPS_CONSUMER_KEY }}
          OPS_CONSUMER_SECRET: ${{ secrets.OPS_CONSUMER_SECRET }}
        run: python ops.py
